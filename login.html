<body>

    <header>
        <img src="imagens/logo.png" width="120">
        
        <nav>
            <ul>
                <li><a href="index.html">Voltar para o Início</a></li>
                <li><a href="cadastro.html">Ainda não tem conta? Cadastre-se</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <main>
        <section>
            <h2>Acesse sua Conta</h2>
            <p>Insira seus dados para acessar o gerador de playbooks de vendas.</p>

            <form action="dashboard.html" method="GET">
                <p>
                    <label for="email">E-mail corporativo ou acadêmico:</label><br>
                    <input type="email" id="email" name="email" required placeholder="exemplo@novaroma.edu.br">
                </p>
                
                <p>
                    <label for="senha">Senha:</label><br>
                    <input type="password" id="senha" name="senha" required>
                </p>

                <p>
                    <button type="submit">Entrar na Vant.Ai</button>
                </p>
            </form>

            <p><a href="#">Esqueci minha senha</a></p>
        </section>
    </main>

    <hr>

    </footer>
